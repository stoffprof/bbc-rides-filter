<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BBC Rides — Custom Calendar Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 36rem;
      margin: 3rem auto;
      padding: 0 1.25rem;
      line-height: 1.6;
      color: #222;
    }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-top: 0; margin-bottom: 2rem; }
    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    legend { font-weight: 600; padding: 0 0.4rem; }
    label {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.4rem 0;
      cursor: pointer;
    }
    input[type="checkbox"] { width: 1.1rem; height: 1.1rem; cursor: pointer; margin-top: 0.2rem; flex-shrink: 0; }
    .type-name { font-weight: 500; }
    .type-desc { display: block; font-size: 0.82rem; color: #555; line-height: 1.4; margin-top: 0.15rem; }
    .result {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 1rem 1.25rem;
    }
    .result p { margin: 0.4rem 0; }
    .result code {
      display: block;
      word-break: break-all;
      background: #e8e8e8;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }
    .actions { display: flex; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap; }
    button, a.btn {
      padding: 0.45rem 1rem;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      border: none;
    }
    a.btn-primary {
      background: #0969da;
      color: #fff;
    }
    button.btn-secondary {
      background: #e8e8e8;
      color: #222;
    }
    .none-selected { color: #c00; font-style: italic; }
    .credit {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #777;
      text-align: center;
    }
    .credit a {
      color: inherit;
      text-decoration-color: #bbb;
      text-underline-offset: 0.15em;
    }
    .credit a:hover { color: #444; }
    .claude-credit {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .claude-icon {
      width: 0.95em;
      height: 0.95em;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>BBC Rides</h1>
  <p class="subtitle"><a href="https://www.bloomingtonbicycleclub.org/calendar">Bloomington Bicycle Club</a> — filtered calendar feed</p>

  <fieldset>
    <legend>Include ride types</legend>
    <label><input type="checkbox" value="32" checked><span>
      <span class="type-name">General rides</span>
    </span></label>
    <label><input type="checkbox" value="1"  checked><span>
      <span class="type-name">Metric Monday</span>
      <span class="type-desc">60–70 mile drive-and-ride starting from various Southern Indiana towns. Carpool from Bryan Park may be arranged. Aims for a lunch stop. Runs April–October.</span>
    </span></label>
    <label><input type="checkbox" value="2"  checked><span>
      <span class="type-name">Nice 'n' Easy</span>
      <span class="type-desc">Sunday rides for less experienced riders and those wanting a relaxed pace. 19–24 miles at a slower pace. Meet at Switchyard Park (spray pad area) for a 1:00 pm departure.</span>
    </span></label>
    <label><input type="checkbox" value="4"  checked><span>
      <span class="type-name">Early Birds</span>
      <span class="type-desc">Earlier-start, moderate-paced rides at 12–15 mph. No-drop but not a beginner's ride. Routes posted in advance. 20–30+ miles, increasing as the season progresses.</span>
    </span></label>
    <label><input type="checkbox" value="8"  checked><span>
      <span class="type-name">iRide</span>
      <span class="type-desc">No-drop ride with regroup points for riders wanting to push the pace without being race-oriented. 16–18 mph average. Often follows the OWLS route with extra miles and climbs added in the second half.</span>
    </span></label>
    <label><input type="checkbox" value="16" checked><span>
      <span class="type-name">Growlers</span>
      <span class="type-desc">Off-road adventure rides on gravel, singletrack, and doubletrack. Start at 6 PM through fall/winter, ~2 hours. Lights mandatory in fall/winter.</span>
    </span></label>
  </fieldset>

  <div class="result" id="result"></div>

  <p class="credit">
    Built by
    <span class="claude-credit">
      <svg class="claude-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 509.64" aria-hidden="true">
        <path fill="#D77655" d="M115.612 0h280.775C459.974 0 512 52.026 512 115.612v278.415c0 63.587-52.026 115.612-115.613 115.612H115.612C52.026 509.639 0 457.614 0 394.027V115.612C0 52.026 52.026 0 115.612 0z"/>
        <path fill="#FCF2EE" d="M142.27 316.619l73.655-41.326 1.238-3.589-1.238-1.996-3.589-.001-12.31-.759-42.084-1.138-36.498-1.516-35.361-1.896-8.897-1.895-8.34-10.995.859-5.484 7.482-5.03 10.717.935 23.683 1.617 35.537 2.452 25.782 1.517 38.193 3.968h6.064l.86-2.451-2.073-1.517-1.618-1.517-36.776-24.922-39.81-26.338-20.852-15.166-11.273-7.683-5.687-7.204-2.451-15.721 10.237-11.273 13.75.935 3.513.936 13.928 10.716 29.749 23.027 38.848 28.612 5.687 4.727 2.275-1.617.278-1.138-2.553-4.271-21.13-38.193-22.546-38.848-10.035-16.101-2.654-9.655c-.935-3.968-1.617-7.304-1.617-11.374l11.652-15.823 6.445-2.073 15.545 2.073 6.547 5.687 9.655 22.092 15.646 34.78 24.265 47.291 7.103 14.028 3.791 12.992 1.416 3.968 2.449-.001v-2.275l1.997-26.641 3.69-32.707 3.589-42.084 1.239-11.854 5.863-14.206 11.652-7.683 9.099 4.348 7.482 10.716-1.036 6.926-4.449 28.915-8.72 45.294-5.687 30.331h3.313l3.792-3.791 15.342-20.372 25.782-32.227 11.374-12.789 13.27-14.129 8.517-6.724 16.1-.001 11.854 17.617-5.307 18.199-16.581 21.029-13.75 17.819-19.716 26.54-12.309 21.231 1.138 1.694 2.932-.278 44.536-9.479 24.062-4.347 28.714-4.928 12.992 6.066 1.416 6.167-5.106 12.613-30.71 7.583-36.018 7.204-53.636 12.689-.657.48.758.935 24.164 2.275 10.337.556h25.301l47.114 3.514 12.309 8.139 7.381 9.959-1.238 7.583-18.957 9.655-25.579-6.066-59.702-14.205-20.474-5.106-2.83-.001v1.694l17.061 16.682 31.266 28.233 39.152 36.397 1.997 8.999-5.03 7.102-5.307-.758-34.401-25.883-13.27-11.651-30.053-25.302-1.996-.001v2.654l6.926 10.136 36.574 54.975 1.895 16.859-2.653 5.485-9.479 3.311-10.414-1.895-21.408-30.054-22.092-33.844-17.819-30.331-2.173 1.238-10.515 113.261-4.929 5.788-11.374 4.348-9.478-7.204-5.03-11.652 5.03-23.027 6.066-30.052 4.928-23.886 4.449-29.674 2.654-9.858-.177-.657-2.173.278-22.37 30.71-34.021 45.977-26.919 28.815-6.445 2.553-11.173-5.789 1.037-10.337 6.243-9.2 37.257-47.392 22.47-29.371 14.508-16.961-.101-2.451h-.859l-98.954 64.251-17.618 2.275-7.583-7.103.936-11.652 3.589-3.791 29.749-20.474-.101.102.024.101z"/>
      </svg>
      Claude
    </span>
    and <a href="https://www.stoffprof.com">Noah Stoffman</a>
  </p>

  <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const result = document.getElementById('result');

    function baseUrl() {
      const href = window.location.href.split('?')[0];
      return href.endsWith('/') ? href : href.substring(0, href.lastIndexOf('/') + 1);
    }

    function update() {
      let mask = 0;
      checkboxes.forEach(cb => { if (cb.checked) mask += parseInt(cb.value, 10); });

      if (mask === 0) {
        result.innerHTML = '<p class="none-selected">Select at least one ride type.</p>';
        return;
      }

      const icsFile = `bbc-rides-${mask}.ics`;
      const httpsUrl = baseUrl() + icsFile;
      const webcalUrl = httpsUrl.replace(/^https?:\/\//, 'webcal://');

      result.innerHTML = `
        <p>Your custom feed URL:</p>
        <code id="url-text">${webcalUrl}</code>
        <div class="actions">
          <a class="btn btn-primary" href="${webcalUrl}">Subscribe in Calendar</a>
          <button class="btn-secondary" onclick="copyUrl()">Copy link</button>
        </div>
        <p style="margin-top:0.75rem;font-size:0.85rem;color:#555;">
          Or paste into any calendar app that accepts ICS subscriptions:<br>
          <a href="${httpsUrl}" style="font-size:0.8rem;word-break:break-all;">${httpsUrl}</a>
        </p>`;
    }

    window.copyUrl = function () {
      const url = document.getElementById('url-text').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('button.btn-secondary');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy link'; }, 1500);
      });
    };

    checkboxes.forEach(cb => cb.addEventListener('change', update));
    update();
  </script>
</body>
</html>
