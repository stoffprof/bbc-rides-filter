name: Update filtered ICS

on:
  # Every 3 hours starting at 5:20 AM UTC. Cron is best-effort; actual runs may be delayed.
  schedule:
    - cron: "20 2,5,8,11,14,17,20,23 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Rebuild on pushes that change the script or workflow itself.
  push:
    branches: [main]
    paths:
      - "scripts/filter_ics.py"
      - "requirements.txt"
      - ".github/workflows/update.yml"
      - "index.html"

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build filtered ICS
        run: python scripts/filter_ics.py

      - name: Copy index.html
        run: cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
